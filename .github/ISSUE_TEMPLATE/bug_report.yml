name: Bug Report
description: Report a bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for submitting a bug report! Please describe the problem in as much detail as possible.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clearly and concisely describe the issue you encountered
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run ...
        2. Click ...
        3. Error appears ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: Zep Backend Mode
      options:
        - cloud (Zep Cloud)
        - graphiti (Local Neo4j)
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Information
      description: OS, Python version, Node.js version, etc.
      placeholder: |
        - OS: macOS 14.x
        - Python: 3.11.x
        - Node.js: 18.x
    validations:
      required: false